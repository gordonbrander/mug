# Obsidian — a wiki / digital-garden theme for mug.
#
# A site activates this theme with a top-level `theme: themes/obsidian` key.
# These values are defaults the site inherits and can override.

# Every markdown note renders with note.html unless it sets its own template.
# `notes` is the catch-all collection of pages, used by the home page index.
collections:
  notes:
    path: "*.md"
    order_by: title
    sort: asc
    omit: ["index.md"] # the home page lists the rest; it shouldn't list itself
  # No `path` matches every document. Used by sitemap.xml.
  all: {}

# Apply the note layout to every member of `notes`. A document's own
# frontmatter (e.g. index.md's `template: index.html`) always wins.
defaults:
  notes:
    template: note.html
