site:
  title: My Site
  description: A site built with mug.
  # Origin used for absolute URLs in feeds and sitemaps. Edit before publishing.
  url: https://example.com
  # Subpath the site is hosted under, e.g. "/blog". Leave empty for root.
  base_path: ""

# Default frontmatter applied by file glob. Values fill keys a document did not
# set itself (a document's own frontmatter always wins). When several globs
# match, later entries win. `*` does not cross `/`; use `**` to recurse.
# defaults:
#   "posts/*.md":
#     permalink: ":yyyy/:mm/:dd/:slug"

# Named collections: queries evaluated once and cached for cheap template access.
# Read them with `{% for p in collection(name="posts") %}`. Each takes the same
# options as a generator query: path (glob), tag, order_by (title|date|updated),
# sort (asc|desc), limit, omit.
# collections:
#   posts:
#     path: "posts/*.md"
#     order_by: date
#     sort: desc
#   recent:
#     path: "posts/*.md"
#     limit: 5
#
# Tags are exposed as a group keyed by tag slug:
# `{% for tag, docs in group(name="tags") %}`.
