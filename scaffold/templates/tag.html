{% extends "base.html" %}

{% block title %}#{{ term.text }} | {{ site.title }}{% endblock title %}

{% block content %}
<h1>Tagged "{{ term.text }}"</h1>
<ul class="post-list">
  {% for item in pagination.items %}
  <li>
    <a href="{{ item.id_path | permalink }}">{{ item.title }}</a>
    <time datetime="{{ item.date | date(format='%Y-%m-%d') }}">{{ item.date | date(format="%b %-d, %Y") }}</time>
  </li>
  {% endfor %}
</ul>
{% endblock content %}
