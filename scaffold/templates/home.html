{% extends "base.html" %}

{% block content %}
{{ page.content | safe }}
<h2>Recent posts</h2>
<ul class="post-list">
  {% for item in collection(name="recent") %}
  <li>
    <a href="{{ item.id_path | permalink }}">{{ item.title }}</a>
    <time datetime="{{ item.date | date(format='%Y-%m-%d') }}">{{ item.date | date(format="%b %-d, %Y") }}</time>
  </li>
  {% endfor %}
</ul>
{% endblock content %}
